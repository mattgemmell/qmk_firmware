	<div xmlns="http://www.w3.org/1999/xhtml" lang="en" title="S (tap), Control (held) (Transparent)" class="transparent mg___blue hrm_s_lctl _num"><div class="glyph">S</div><div class="annotation hrm-control">control</div></div>
