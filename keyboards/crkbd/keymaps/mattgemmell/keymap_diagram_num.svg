	<div xmlns="http://www.w3.org/1999/xhtml" lang="en" title="D (tap), Option (held) (Transparent)" class="transparent mg___blue hrm_d_lalt _num"><div class="glyph">D</div><div class="annotation hrm-option">option</div></div>
</foreignObject>

<foreignObject x="221" y="73" width="65" height="55" class="text-container">
	<div xmlns="http://www.w3.org/1999/xhtml" lang="en" title="F (tap), Command (held) (Transparent)" class="transparent mg___blue hrm_f_lgui _num"><div class="glyph">F</div><div class="annotation hrm-command">command</div></div>
</foreignObject>

